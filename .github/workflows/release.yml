name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: --win --x64 --arm64
          - os: ubuntu-latest
            cmd: --linux --x64 --arm64
          - os: macos-14
            cmd: --mac --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package
        run: npx electron-builder ${{ matrix.cmd }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      # electron-builder also emits a combined multi-arch installer (no -x64/-arm64
      # suffix); drop it so only the per-arch installers ship.
      - name: Drop combined Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem release -Filter *.exe | Where-Object { $_.Name -notmatch '-(x64|arm64)\.exe$' } | Remove-Item -Force -Verbose
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.dmg
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
