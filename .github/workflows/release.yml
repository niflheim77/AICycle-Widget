name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build each Windows arch separately so no combined installer is produced.
          - os: windows-latest
            cmd: npx electron-builder --win --x64 --publish never && npx electron-builder --win --arm64 --publish never
          - os: ubuntu-latest
            cmd: npx electron-builder --linux --x64 --arm64 --publish never
          - os: macos-14
            cmd: npx electron-builder --mac --arm64 --publish never
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package
        run: ${{ matrix.cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.dmg
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
